project:
  type: default
  # Resolves @doi:, @pmid:, @arxiv:, @isbn:, @url:, @wikidata:, @pmcid:,
  # and bare DOIs before pandoc runs. The resolved entries land in
  # references.resolved.bib (gitignored — regenerated each render) and
  # pandoc reads it alongside hand-curated entries in references.bib.
  pre-render: quartobot resolve --from-scan . --id-mode citation-key
  render:
    - slides.qmd

bibliography:
  - references.bib
  - references.resolved.bib

# Numeric superscripts keep citations out of the way on a slide; AMA is the
# convention this audience reads in.
csl: ama.csl

# The deck's own format block (revealjs) lives in slides.qmd.

format:
  revealjs:
    # Draw over the current slide (C) or open a blank board (B); D downloads
    # the drawings. Lives here rather than in slides.qmd so the `share`
    # profile can switch it off — document YAML would outrank the profile.
    chalkboard:
      theme: chalkboard
      boardmarker-width: 4
      buttons: true

# livefigures renders diagram sources (e.g. figures/*.dot) at build time.
# pre-ast so cross-references work on inline fenced-block figures too.
filters:
  - at: pre-ast
    path: livefigures
