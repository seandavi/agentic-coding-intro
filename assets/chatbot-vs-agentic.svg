<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img"
     aria-label="Comparison of a chatbot and an agentic coding tool. A chatbot drives a copy-and-paste loop that stays disconnected from your repository. An agentic coding tool runs a plan, act, observe, revise loop that is connected to your repository through files, shell, git, and MCP.">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .pill { font-size: 16px; font-weight: 500; }
    .h { font-size: 22px; font-weight: 700; }
    .sub { font-size: 14px; }
    .chip { font-size: 12px; font-weight: 600; }
    .lbl { font-size: 12px; font-weight: 600; }
  </style>

  <defs>
    <marker id="aSlate" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="aBlue" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="aGrey" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#cbd5e1"/>
    </marker>
    <marker id="aBlueS" markerWidth="9" markerHeight="9" refX="3" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M6,0 L0,3 L6,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="aBlueE" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="3" y="3" width="1194" height="644" rx="22" fill="#f6f8fb" stroke="#e6eaf0" stroke-width="2"/>

  <!-- title -->
  <text class="h" x="600" y="56" text-anchor="middle" font-size="30" fill="#0f172a">Chatbot &#160;vs.&#160; Agentic Coding Tool</text>
  <text class="sub" x="600" y="88" text-anchor="middle" font-size="17" fill="#64748b">A chatbot answers. An agentic coding tool acts &#8212; in the repository where the work lives.</text>

  <!-- ============ LEFT PANEL : CHATBOT ============ -->
  <rect x="45" y="120" width="525" height="500" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="84" cy="162" r="7" fill="#94a3b8"/>
  <text class="h" x="100" y="170" fill="#334155">Chatbot</text>
  <text class="sub" x="72" y="196" fill="#94a3b8">Disconnected from your code</text>
  <line x1="72" y1="212" x2="543" y2="212" stroke="#eef2f7" stroke-width="1.5"/>

  <!-- pills -->
  <g>
    <rect x="96" y="234" width="424" height="44" rx="10" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text class="pill" x="308" y="261" text-anchor="middle" fill="#475569">Ask a question in a browser tab</text>

    <rect x="96" y="298" width="424" height="44" rx="10" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text class="pill" x="308" y="325" text-anchor="middle" fill="#475569">Copy a code snippet</text>

    <rect x="96" y="362" width="424" height="44" rx="10" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text class="pill" x="308" y="389" text-anchor="middle" fill="#475569">Paste it into your editor</text>

    <rect x="96" y="426" width="424" height="44" rx="10" fill="#fef3c7" stroke="#fcd34d"/>
    <text class="pill" x="308" y="453" text-anchor="middle" fill="#92400e">It doesn't fit your repository</text>
  </g>

  <!-- down arrows -->
  <line x1="308" y1="278" x2="308" y2="294" stroke="#94a3b8" stroke-width="2" marker-end="url(#aSlate)"/>
  <line x1="308" y1="342" x2="308" y2="358" stroke="#94a3b8" stroke-width="2" marker-end="url(#aSlate)"/>
  <line x1="308" y1="406" x2="308" y2="422" stroke="#94a3b8" stroke-width="2" marker-end="url(#aSlate)"/>

  <!-- return loop -->
  <path d="M520,448 C560,430 560,272 522,256" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#aGrey)"/>
  <text class="lbl" x="556" y="352" text-anchor="middle" fill="#94a3b8" transform="rotate(-90 556 352)">repeat</text>

  <!-- broken link to repo -->
  <line x1="308" y1="470" x2="308" y2="479" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="3 3"/>
  <circle cx="308" cy="490" r="9" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <line x1="304" y1="486" x2="312" y2="494" stroke="#f59e0b" stroke-width="2"/>
  <line x1="312" y1="486" x2="304" y2="494" stroke="#f59e0b" stroke-width="2"/>
  <line x1="308" y1="501" x2="308" y2="510" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="3 3"/>

  <!-- repo (out of reach) -->
  <rect x="96" y="510" width="424" height="78" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="308" y="542" text-anchor="middle" font-size="16" font-weight="600" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">Your repository</text>
  <text x="308" y="566" text-anchor="middle" font-size="13" fill="#b6c0cd" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">out of reach</text>

  <!-- ============ CENTER BADGE ============ -->
  <circle cx="600" cy="370" r="26" fill="#0f172a"/>
  <text x="600" y="377" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">vs</text>

  <!-- ============ RIGHT PANEL : AGENTIC ============ -->
  <rect x="630" y="120" width="525" height="500" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="668" cy="162" r="7" fill="#2563eb"/>
  <text class="h" x="684" y="170" fill="#1e293b">Agentic coding tool</text>
  <text class="sub" x="656" y="196" fill="#2563eb">Works where the code lives</text>
  <line x1="657" y1="212" x2="1128" y2="212" stroke="#eef2f7" stroke-width="1.5"/>

  <!-- pills -->
  <g>
    <rect x="680" y="234" width="424" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
    <text class="pill" x="892" y="261" text-anchor="middle" fill="#1e40af">Plan the change</text>

    <rect x="680" y="298" width="424" height="44" rx="10" fill="#dbeafe" stroke="#93c5fd"/>
    <text class="pill" x="892" y="325" text-anchor="middle" fill="#1e40af">Act &#8212; edit files, run tests</text>

    <rect x="680" y="362" width="424" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
    <text class="pill" x="892" y="389" text-anchor="middle" fill="#1e40af">Observe the results</text>

    <rect x="680" y="426" width="424" height="44" rx="10" fill="#dcfce7" stroke="#86efac"/>
    <text class="pill" x="892" y="453" text-anchor="middle" fill="#166534">Revise with feedback</text>
  </g>

  <!-- down arrows -->
  <line x1="892" y1="278" x2="892" y2="294" stroke="#3b82f6" stroke-width="2" marker-end="url(#aBlue)"/>
  <line x1="892" y1="342" x2="892" y2="358" stroke="#3b82f6" stroke-width="2" marker-end="url(#aBlue)"/>
  <line x1="892" y1="406" x2="892" y2="422" stroke="#3b82f6" stroke-width="2" marker-end="url(#aBlue)"/>

  <!-- return loop -->
  <path d="M1104,448 C1144,430 1144,272 1106,256" fill="none" stroke="#93c5fd" stroke-width="2" marker-end="url(#aBlue)"/>
  <text class="lbl" x="1140" y="352" text-anchor="middle" fill="#3b82f6" transform="rotate(-90 1140 352)">iterate</text>

  <!-- live connection to repo -->
  <line x1="892" y1="470" x2="892" y2="510" stroke="#2563eb" stroke-width="2.5" marker-start="url(#aBlueS)" marker-end="url(#aBlueE)"/>
  <text class="lbl" x="908" y="494" fill="#2563eb">in sync</text>

  <!-- repo (connected) -->
  <rect x="680" y="510" width="424" height="78" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="892" y="534" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">Your repository</text>
  <g>
    <rect x="704" y="548" width="84" height="24" rx="12" fill="#dbeafe" stroke="#bfdbfe"/>
    <text class="chip" x="746" y="564" text-anchor="middle" fill="#1e40af">Files</text>
    <rect x="800" y="548" width="84" height="24" rx="12" fill="#dbeafe" stroke="#bfdbfe"/>
    <text class="chip" x="842" y="564" text-anchor="middle" fill="#1e40af">Shell</text>
    <rect x="896" y="548" width="84" height="24" rx="12" fill="#dbeafe" stroke="#bfdbfe"/>
    <text class="chip" x="938" y="564" text-anchor="middle" fill="#1e40af">Git</text>
    <rect x="992" y="548" width="84" height="24" rx="12" fill="#dbeafe" stroke="#bfdbfe"/>
    <text class="chip" x="1034" y="564" text-anchor="middle" fill="#1e40af">MCP</text>
  </g>
</svg>
